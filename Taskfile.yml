version: '3'

vars:
  PYTHON_PATH: .
  PACKAGE_NAME: my_python_project_template

tasks:
  install:
    desc: Install project dependencies and sync with uv.lock
    cmds:
      - uv sync

  run:
    desc: Run the project's main script
    cmds:
      - uv run my-python-project-template

  test:
    desc: Run the full pytest suite
    cmds:
      - uv run pytest

  test-cov:
    desc: Run tests and generate a coverage report
    cmds:
      - uv run pytest --cov={{.PACKAGE_NAME}} --cov-report=term-missing

  lint:
    desc: Lint the project using ruff and apply safe fixes
    cmds:
      - uv run ruff check . --fix

  format:
    desc: Format the code using ruff
    cmds:
      - uv run ruff format .

  check:
    desc: Perform all static analysis (lint, format, and type check)
    cmds:
      - uv run ruff check . --fix
      - uv run ruff format .
      - task: mypy

  mypy:
    desc: Run static type checking using mypy
    cmds:
      - uv run mypy .

  clean:
    desc: Remove temporary build and test files
    cmds:
      - rm -rf .pytest_cache .coverage .ruff_cache output/ .mypy_cache
      - find . -type d -name "__pycache__" -exec rm -rf {} +
      - echo "Cleaned up temporary files and output/ directory"

  bump-patch:
    desc: Bump patch version
    cmds:
      - uv run bump-my-version bump patch

  bump-minor:
    desc: Bump minor version
    cmds:
      - uv run bump-my-version bump minor

  bump-major:
    desc: Bump major version
    cmds:
      - uv run bump-my-version bump major

  all:
    desc: Perform a full check (format, lint, test)
    cmds:
      - task: check
      - task: test-cov
